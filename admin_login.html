<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NairaPulse | Admin Secure Entry</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #333; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #e63946; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        button:hover { background: #d62839; }
        .error { color: #dc3545; font-size: 0.85rem; margin-bottom: 15px; text-align: center; display: none; }
        .password-container { position: relative; margin-bottom: 20px; }
        .password-toggle { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: #555; margin-top: -15px; margin-bottom: 15px; }
        .password-toggle input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        .password-toggle label { cursor: pointer; user-select: none; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #888; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Admin Portal</h2>
    <div id="errorMsg" class="error">Access Denied: Not an admin account.</div>
    
    <input type="email" id="email" placeholder="Admin Email" required>
    <input type="password" id="password" placeholder="Secure Password" required>
    <div class="password-toggle">
        <input type="checkbox" id="showPassword">
        <label for="showPassword">Show Password</label>
    </div>
    <button onclick="adminLogin()" id="loginBtn">Secure Login</button>
    
    <a href="index.html" class="back-link">← Return to Main Site</a>
</div>

<script>
    const supabaseClient = supabase.createClient(
        "https://rthpqfyeazputmufqkwd.supabase.co", 
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0aHBxZnllYXpwdXRtdWZxa3dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjU2NDEsImV4cCI6MjA5MDIwMTY0MX0.j0XIfWSqyhnjA3q73hnoLbQOVpVJa_f8xPXb9EsgLGI"
    );

    // ===== SHOW/HIDE PASSWORD =====
    document.getElementById('showPassword').addEventListener('change', function() {
        const passwordField = document.getElementById('password');
        passwordField.type = this.checked ? 'text' : 'password';
    });

    async function adminLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('errorMsg');
        const btn = document.getElementById('loginBtn');

        btn.innerText = "Verifying...";
        errorMsg.style.display = 'none';

        try {
            // 1. Authenticate with Supabase
            const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({
                email,
                password
            });

            if (authError) throw new Error(authError.message);

            // 2. CHECK IF THIS USER IS AN ADMIN IN THE DB
            // We use maybeSingle() to avoid a crash if the profile is missing
            const { data: profile, error: profileError } = await supabaseClient
                .from('users')
                .select('is_admin')
                .eq('id', authData.user.id)
                .maybeSingle();

            // DEBUG LOG: Press F12 in your browser to see this!
            console.log("Logged in UID:", authData.user.id);
            console.log("Admin Status from Database:", profile?.is_admin);

            if (profileError || !profile || profile.is_admin !== true) {
                // If not an admin, log them out immediately to clear the session
                await supabaseClient.auth.signOut();
                throw new Error("Unauthorized: Your account does not have admin privileges.");
            }

            // 3. SUCCESS: Redirect to the Admin Panel
            // Ensure this filename matches your admin dashboard file!
            window.location.href = "admin-panel.html";

        } catch (err) {
            console.error("Login Error:", err.message);
            errorMsg.innerText = err.message;
            errorMsg.style.display = 'block';
            btn.innerText = "Secure Login";
        }
    }
</script>

</body>
</html>
